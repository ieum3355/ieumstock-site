<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀 노트: 내가 사면 떨어지고 내가 팔면 오르는 주식</title>
    <meta name="description" content="주식 투자 심리와 멘탈 관리를 위한 시크릿 노트. 투자 고수들의 비밀스러운 인사이트와 매매 원칙을 구독자 한정으로 공개합니다.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- Scripts -->
    <script src="data/content_db.js"></script>
    <script src="app.js" defer></script>

    <!-- Google AdSense (Auto-Ads) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8647754848563648"
        crossorigin="anonymous"></script>

    <style>
        .blog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .blog-header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .blog-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .blog-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .post-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .post-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #d1d5db;
        }

        .post-content p {
            margin-bottom: 20px;
        }

        .highlight-box {
            background: rgba(212, 175, 55, 0.1);
            border-left: 4px solid var(--accent-color);
            padding: 20px;
            margin: 30px 0;
            border-radius: 4px;
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .new-badge {
            background-color: #ff4757;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            font-weight: 700;
            vertical-align: middle;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(255, 71, 87, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-logo">🔒 Secret Blog</div>
            <a href="index.html" style="color: var(--text-primary); text-decoration: none; font-weight: 600;">← 메인으로
                돌아가기</a>
        </div>
    </nav>

    <div class="blog-container">
        <header class="blog-header">
            <div class="tag">Secret Access Only</div>
            <h1 class="blog-title">내가 사면 떨어지고<br>내가 팔면 오르는 주식</h1>
            <p class="blog-meta">구독자님을 위한 특별한 투자 심리학 노트</p>
        </header>

        <div id="blog-posts-container">
            <!-- Posts will be injected here via JS -->
            <div style="text-align: center; padding: 50px;">
                <p>비밀 노트를 불러오는 중입니다... 🕵️‍♂️</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <p style="color: var(--text-secondary); margin-bottom: 20px;">매주 새로운 비밀글이 업데이트됩니다.</p>
        </div>

    </div>

</body>

</html>
